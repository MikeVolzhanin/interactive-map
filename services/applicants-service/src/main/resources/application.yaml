spring:
  application:
    name: applicants-service
  datasource:
    url: jdbc:postgresql://localhost:5432/interactive-map-db
    password: postgres
    username: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 1 hour in milliseconds
  refresh-expiration: 86400000 # 24 hours

otp:
  expiration: 300000 # 5 minutes in milliseconds
  length: 6

